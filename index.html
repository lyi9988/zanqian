<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自由攒钱计划</title>
<style>
    /* 基础和背景设置，营造暖色调可爱氛围 */
    body {
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        background-color: #fefcf5; /* 暖黄色背景 */
        color: #333;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
    }

    /* 手机壳容器 */
    .app-container {
        width: 100%;
        max-width: 380px;
        background: #ffffff;
        padding: 25px 20px;
        border-radius: 20px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        position: relative;
    }

    /* 顶部标题栏 */
    .header {
        text-align: center;
        font-size: 20px;
        font-weight: bold;
        padding-bottom: 15px;
        border-bottom: 2px solid #222;
        margin-bottom: 25px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }

    /* 章节标题 (带下划线高亮效果) */
    .section-title {
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 15px;
        position: relative;
        display: inline-block;
        z-index: 1;
    }
    .section-title::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: 2px;
        width: 100%;
        height: 6px;
        background-color: #fce17a; /* 荧光笔黄色 */
        z-index: -1;
        border-radius: 4px;
    }

    /* 卡片输入框样式 */
    .card-input {
        border: 2px solid #222;
        border-radius: 12px;
        padding: 12px 15px;
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 25px;
    }
    .card-input input {
        border: none;
        outline: none;
        font-size: 15px;
        flex: 1;
        color: #333;
    }

    /* 标签 */
    .label {
        font-size: 13px;
        color: #888;
        margin-bottom: 8px;
        display: block;
        font-weight: bold;
    }

    /* 周期选择器 (还原截图中的胶囊Tab) */
    .cycle-tabs {
        display: flex;
        align-items: center;
        margin-bottom: 25px;
        background: #fdfdfd;
        border-radius: 10px;
    }
    .tab {
        flex: 1;
        text-align: center;
        padding: 10px 0;
        font-size: 13px;
        cursor: pointer;
        color: #666;
        border-top: 2px solid #ccc;
        border-bottom: 2px solid #ccc;
        border-right: 1px solid #ccc;
    }
    .tab:first-child { border-left: 2px solid #ccc; border-top-left-radius: 10px; border-bottom-left-radius: 10px; }
    .tab:last-child { border-right: 2px solid #ccc; border-top-right-radius: 10px; border-bottom-right-radius: 10px; }
    
    .tab.active {
        background-color: #de5b7d; /* 粉红色 */
        color: #fff;
        font-weight: bold;
        border: 2px solid #222 !important;
        border-radius: 10px;
        transform: scale(1.05); /* 稍微放大突出显示 */
        z-index: 10;
        position: relative;
    }

    /* 表单行 */
    .form-row {
        margin-bottom: 20px;
    }
    .form-row input[type="date"] {
        width: 100%;
        border: none;
        border-bottom: 1px dashed #ccc;
        padding: 8px 0;
        font-size: 15px;
        outline: none;
        color: #333;
        font-family: inherit;
        background: transparent;
    }

    /* 带粗边框的输入框 (持续时长、目标金额) */
    .bold-input-box {
        border: 2px solid #222;
        border-radius: 10px;
        padding: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .bold-input-box input {
        border: none;
        outline: none;
        font-size: 16px;
        flex: 1;
        margin: 0 10px;
    }

    /* 粉色提示框 */
    .summary-box {
        background-color: #fae6ec;
        color: #b3516c;
        padding: 15px;
        border-radius: 10px;
        font-size: 13px;
        line-height: 1.5;
        margin-bottom: 30px;
    }
    .summary-box span {
        color: #de5b7d;
        font-weight: bold;
    }

    /* 底部按钮 */
    .btn-save {
        width: 100%;
        background-color: #fce17a; /* 亮黄色 */
        color: #222;
        border: 2px solid #222;
        padding: 15px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 10px;
        cursor: pointer;
        transition: background 0.2s;
    }
    .btn-save:hover { background-color: #f5d450; }
    
    /* 吐司提示 */
    .toast {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 14px;
        display: none;
        z-index: 100;
    }
</style>
</head>
<body>

<div class="app-container">
    <div class="toast" id="toast">保存成功！</div>

    <div class="header">
        🚪 自由攒钱计划
    </div>

    <div class="section-title">设置自由攒钱计划</div>
    <div class="card-input">
        <span>🏠</span>
        <input type="text" id="planName" placeholder="自由攒钱计划">
        <span style="color: #de5b7d; font-size: 12px; border: 1px dashed #de5b7d; padding: 2px 6px; border-radius: 10px;">愿望清单</span>
    </div>

    <div class="section-title">设置基础信息</div>

    <div class="form-row">
        <span class="label">实行周期</span>
        <div class="cycle-tabs">
            <div class="tab active" data-cycle="每天攒">每天攒</div>
            <div class="tab" data-cycle="每周攒">每周攒</div>
            <div class="tab" data-cycle="每月攒">每月攒</div>
            <div class="tab" data-cycle="任意攒">任意攒</div>
        </div>
    </div>

    <div class="form-row">
        <span class="label">起始日期</span>
        <input type="date" id="startDate">
    </div>

    <div class="form-row">
        <span class="label">持续时长</span>
        <div class="bold-input-box">
            <input type="number" id="duration" value="365">
            <span style="font-weight: bold;">天</span>
        </div>
    </div>

    <div class="form-row">
        <span class="label">结束日期</span>
        <input type="date" id="endDate" readonly style="color: #888;">
    </div>

    <div class="form-row">
        <span class="label">目标金额</span>
        <div class="bold-input-box">
            <span style="font-weight: bold;">¥</span>
            <input type="number" id="targetAmount" value="10000">
        </div>
    </div>

    <div class="summary-box">
        不限制每次攒入的金额，在 <span id="displayDate">2027-03-03</span> 之前攒入 <span id="displayAmount">¥10000</span> 即可完成计划
    </div>

    <button class="btn-save" onclick="saveData()">保存至本地</button>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // 获取页面元素
        const planNameInput = document.getElementById('planName');
        const tabs = document.querySelectorAll('.tab');
        const startDateInput = document.getElementById('startDate');
        const durationInput = document.getElementById('duration');
        const endDateInput = document.getElementById('endDate');
        const targetAmountInput = document.getElementById('targetAmount');
        const displayDate = document.getElementById('displayDate');
        const displayAmount = document.getElementById('displayAmount');
        let selectedCycle = '每天攒'; // 默认周期

        // 1. 日期计算逻辑 (起始日期 + 持续天数 - 1 = 结束日期)
        function calculateEndDate() {
            if (!startDateInput.value || !durationInput.value) return;
            
            const start = new Date(startDateInput.value);
            const days = parseInt(durationInput.value);
            
            // 加上天数减去1天（例如今天起存1天，结束也是今天）
            start.setDate(start.getDate() + days - 1); 
            
            // 格式化为 YYYY-MM-DD
            const endStr = start.toISOString().split('T')[0];
            endDateInput.value = endStr;
            
            updateSummary();
        }

        // 2. 更新下方粉色提示框的文字
        function updateSummary() {
            displayDate.textContent = endDateInput.value;
            displayAmount.textContent = '¥' + targetAmountInput.value;
        }

        // 3. 周期切换(Tab)的点击事件
        tabs.forEach(tab => {
            tab.addEventListener('click', (e) => {
                // 移除所有 active 类和重置边框
                tabs.forEach(t => t.classList.remove('active'));
                // 添加当前 active
                e.target.classList.add('active');
                selectedCycle = e.target.dataset.cycle;
            });
        });

        // 4. 监听输入变化，实时计算
        startDateInput.addEventListener('change', calculateEndDate);
        durationInput.addEventListener('input', calculateEndDate);
        targetAmountInput.addEventListener('input', updateSummary);

        // 5. 初始化及本地存储(LocalStorage)读取逻辑
        function init() {
            const savedData = localStorage.getItem('mySavingPlan');
            
            if (savedData) {
                // 如果本地有保存的数据，则回显出来
                const data = JSON.parse(savedData);
                planNameInput.value = data.name;
                startDateInput.value = data.startDate;
                durationInput.value = data.duration;
                targetAmountInput.value = data.amount;
                
                // 恢复周期选择状态
                selectedCycle = data.cycle;
                tabs.forEach(t => {
                    t.classList.remove('active');
                    if(t.dataset.cycle === selectedCycle) {
                        t.classList.add('active');
                    }
                });
                
                calculateEndDate();
            } else {
                // 第一次打开，默认选中今天
                const today = new Date().toISOString().split('T')[0];
                startDateInput.value = today;
                calculateEndDate();
            }
        }

        init(); // 运行初始化
        
        // 6. 保存数据函数 (绑定在底部按钮上)
        window.saveData = function() {
            const dataToSave = {
                name: planNameInput.value,
                cycle: selectedCycle,
                startDate: startDateInput.value,
                duration: durationInput.value,
                amount: targetAmountInput.value
            };
            
            // 将对象转为字符串存在浏览器本地
            localStorage.setItem('mySavingPlan', JSON.stringify(dataToSave));
            
            // 简单的提示动画
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        };
    });
</script>

</body>
</html>
