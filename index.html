<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自由攒钱助手 Pro</title>
<style>
    /* 基础样式：还原可爱暖色调 */
    body { font-family: 'PingFang SC', sans-serif; background-color: #fefcf5; color: #333; margin: 0; padding: 15px; display: flex; justify-content: center; }
    .app-container { width: 100%; max-width: 400px; background: #ffffff; padding: 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 2px solid #222; box-sizing: border-box; }
    
    .header { text-align: center; font-size: 20px; font-weight: bold; padding-bottom: 15px; border-bottom: 2px solid #222; margin-bottom: 20px; }

    /* 进度条：像进度表一样的视觉 */
    .progress-section { background: #fff9e6; border: 2px solid #222; border-radius: 15px; padding: 15px; margin-bottom: 20px; }
    .progress-text { display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; margin-bottom: 10px; }
    .progress-bar-bg { background: #eee; height: 16px; border-radius: 8px; border: 2px solid #222; overflow: hidden; position: relative; }
    .progress-bar-fill { background: #de5b7d; height: 100%; width: 0%; transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    
    /* 操作区：存钱按钮 */
    .action-card { border: 2px solid #222; border-radius: 15px; padding: 15px; background: #fff; margin-bottom: 20px; }
    .input-group { display: flex; gap: 10px; margin-top: 10px; }
    input { border: 2px solid #222; border-radius: 8px; padding: 10px; flex: 1; outline: none; font-size: 16px; -webkit-appearance: none; }
    .btn-add { background: #fce17a; border: 2px solid #222; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
    .btn-add:active { transform: scale(0.95); }

    /* 设置区：折叠显示 */
    .settings-section { border-top: 1px dashed #ccc; padding-top: 15px; margin-top: 10px; }
    summary { font-size: 13px; color: #888; cursor: pointer; padding: 5px; outline: none; }
    .setting-item { margin-top: 10px; }
    .label { font-size: 12px; color: #999; margin-bottom: 4px; display: block; }
    .mini-input { width: 100%; border: none; border-bottom: 2px solid #eee; padding: 8px 0; font-size: 14px; background: transparent; box-sizing: border-box; }
    .btn-save-settings { width: 100%; background: #222; color: #fff; border: none; padding: 12px; border-radius: 10px; margin-top: 15px; font-weight: bold; }
    .btn-reset { color: #cc0000; font-size: 11px; margin-top: 20px; display: block; text-align: center; border: none; background: none; width: 100%; }
</style>
</head>
<body>

<div class="app-container">
    <div class="header">🏠 自由攒钱助手</div>

    <div class="progress-section">
        <div class="progress-text">
            <span id="displayPlanName">加载中...</span>
            <span id="percentText">0%</span>
        </div>
        <div class="progress-bar-bg">
            <div id="progressBar" class="progress-bar-fill"></div>
        </div>
        <div style="margin-top:12px; font-size: 14px; text-align: center; font-weight: bold;">
            已攒 <span id="currentVal" style="color:#de5b7d;">0</span> / <span id="targetVal">0</span> 元
        </div>
    </div>

    <div class="action-card">
        <div style="font-weight:bold; font-size:15px; display:flex; align-items:center; gap:5px;">💰 存入一笔：</div>
        <div class="input-group">
            <input type="number" id="inputAmount" placeholder="输入金额" inputmode="decimal">
            <button class="btn-add" onclick="addMoney()">存一笔</button>
        </div>
    </div>

    <div class="settings-section">
        <details>
            <summary>⚙️ 修改我的计划设置</summary>
            <div class="setting-item">
                <span class="label">计划名称</span>
                <input type="text" id="planName" class="mini-input">
            </div>
            <div class="setting-item">
                <span class="label">目标总额 (元)</span>
                <input type="number" id="targetInput" class="mini-input">
            </div>
            <button class="btn-save-settings" onclick="updateSettings()">保存并更新计划</button>
            <button class="btn-reset" onclick="resetData()">[ 危险操作 ] 清空所有进度</button>
        </details>
    </div>
</div>

<script>
    // 默认数据
    let savingsData = {
        name: "自由攒钱计划",
        target: 10000,
        current: 0
    };

    // 页面加载逻辑
    window.onload = function() {
        const saved = localStorage.getItem('savings_pro_v2');
        if (saved) {
            savingsData = JSON.parse(saved);
        }
        render();
    };

    // 存钱逻辑
    function addMoney() {
        const input = document.getElementById('inputAmount');
        const val = parseFloat(input.value);
        if (isNaN(val) || val <= 0) {
            alert('请输入正确的存钱金额哦！');
            return;
        }

        savingsData.current += val;
        input.value = '';
        saveAndRender();
    }

    // 更新计划设置
    function updateSettings() {
        const newName = document.getElementById('planName').value;
        const newTarget = parseFloat(document.getElementById('targetInput').value);
        
        if (!newName || isNaN(newTarget) || newTarget <= 0) {
            alert('名字或目标金额填错啦！');
            return;
        }

        savingsData.name = newName;
        savingsData.target = newTarget;
        saveAndRender();
        alert('计划更新成功！');
    }

    // 保存并刷新
    function saveAndRender() {
        localStorage.setItem('savings_pro_v2', JSON.stringify(savingsData));
        render();
    }

    // 渲染界面
    function render() {
        document.getElementById('displayPlanName').innerText = savingsData.name;
        document.getElementById('currentVal').innerText = savingsData.current.toLocaleString();
        document.getElementById('targetVal').innerText = savingsData.target.toLocaleString();
        
        // 计算百分比
        let percent = (savingsData.current / savingsData.target) * 100;
        if (percent > 100) percent = 100;
        if (isNaN(percent) || percent < 0) percent = 0;

        document.getElementById('progressBar').style.width = percent + '%';
        document.getElementById('percentText').innerText = percent.toFixed(1) + '%';
        
        // 同步设置里的输入框
        document.getElementById('planName').value = savingsData.name;
        document.getElementById('targetInput').value = savingsData.target;
    }

    // 重置
    function resetData() {
        if(confirm('警告：确定要彻底清空你的攒钱进度吗？此操作不可撤销！')) {
            localStorage.removeItem('savings_pro_v2');
            location.reload();
        }
    }
</script>
</body>
</html>
